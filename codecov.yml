---
coverage:
  precision: 2
  round: down
  range: "70...100"

  status:
    project:
      default:
        target: 100%
        threshold: 0.1%
    patch: off

  ignore:
    - "tests/**"
    - "@examples/**"
    - ".php-cs-fixer.php"
    - "exec.php"
    - "phpunit.xml.dist"
    - "phpstan.neon"
    - ".phpunit.result.cache"

parsers:
  gcov:
    branch_detection:
      conditional: yes
      loop: yes
      macro: no
      method: no

  vcs:
    git:
      slow: yes

comment:
  layout: "reach,diff,flags,tree,about"
  behavior: default
  require_changes: false

...