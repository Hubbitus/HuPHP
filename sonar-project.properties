# Root Project Configuration for SonarCloud

sonar.projectKey=Hubbitus_HuPHP
sonar.organization=hubbitus

# This is the name and version displayed in the SonarCloud UI.
sonar.projectName=HuPHP
sonar.projectVersion=1.0

# Path to source code
sonar.sources=.

# Path to test files
sonar.tests=tests

# Encoding of the source code
sonar.sourceEncoding=UTF-8

# Paths to exclude from analysis
sonar.exclusions= \
  tests/**, \
  vendor/**, \
  @tools/**, \
  @examples/**, \
  build/**, \
  .github/**, \
  *.php

# Path to the coverage report
sonar.php.coverage.reportPaths=build/coverage.xml
