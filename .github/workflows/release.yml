name: Release

on:
  push:
    branches:
      - master
  issue_comment:
    types: [created]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # On PR comments, checkout the PR's head commit. Otherwise, checkout the default branch.
          ref: ${{ github.event_name == 'issue_comment' && github.event.issue.pull_request.head.sha || github.ref }}
          fetch-depth: 0

      - name: Generate version
        id: generate_version
        run: |
          VERSION="v$(date +'%Y%m%d%H%M%S')"
          if [[ "${{ github.event_name }}" == "issue_comment" ]]; then
            VERSION="$VERSION-pr"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, intl, gd, xml, dom, zip, bz2
          tools: composer
          ini-values: phar.readonly=0

      - name: Install Dependencies
        run: composer install --prefer-dist --no-progress

      - name: Regenerate All
        run: bash ./@tools/regenerate.all

      - name: Create Release with PhAR (master)
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: Release ${{ env.VERSION }}
          files: ./@tools/Packages/build/HuPHP.phar

      - name: Create Pre-Release with PhAR (PR)
        if: |
          github.event_name == 'issue_comment' &&
          github.event.issue.pull_request &&
          contains(github.event.comment.body, '/release') &&
          (github.event.comment.author_association == 'COLLABORATOR' || github.event.comment.author_association == 'OWNER')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: Release ${{ env.VERSION }}
          prerelease: true
          files: ./@tools/Packages/build/HuPHP.phar
