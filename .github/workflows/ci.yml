name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, intl, gd, xml, dom, zip, bz2
          tools: composer

      - name: Install Dependencies
        run: composer install --prefer-dist --no-progress

      - name: Run Lint
        run: ./tests/lint.sh

      - name: Run Tests with Coverage
        run: |
          mkdir -p build
          XDEBUG_MODE=coverage ./vendor/bin/phpunit --coverage-clover=build/coverage.xml

      - name: Check 100% Coverage
        run: |
          echo "--- Checking coverage ---"
          # Print the full text report to the log for debugging.
          FULL_REPORT=$(XDEBUG_MODE=coverage ./vendor/bin/phpunit --coverage-text)
          echo "$FULL_REPORT"
          echo "--- End of report ---"

          COVERAGE=$(echo "$FULL_REPORT" | grep "Lines:" | awk '{print $2}' | tr -d '%')
          echo "Coverage from report: $COVERAGE%"

          # Correctly check if coverage is less than 100 using bc.
          # The `|| true` is a safeguard in case COVERAGE is empty.
          if [ "$(echo "$COVERAGE < 100" | bc -l || true)" -eq 1 ]; then
            echo "❌ Coverage is below 100% ($COVERAGE%). See report above for details."
            exit 1
          fi
          echo "✅ 100% coverage achieved!"

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./build/coverage.xml
          flags: unittests
          name: huphp
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Regenerate All
        run: bash ./@tools/regenerate.all

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: logs
          path: './@tools/regenerate.all.log'

  deploy-docs:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, intl, gd, xml, dom, zip, bz2
          tools: composer
          ini-values: phar.readonly=0

      - name: Install Dependencies
        run: composer install --prefer-dist --no-progress

      - name: Generate PHPDoc
        run: bash ./@tools/generate-phpdoc.sh

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './@phpdocs'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4