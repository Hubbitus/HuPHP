name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, intl, gd, xml, dom, zip, bz2
          tools: composer

      - name: Install Dependencies
        run: composer install --prefer-dist --no-progress

      - name: Run Lint
        run: ./tests/lint.sh

      - name: Install enconv
        run: |
          sudo apt-get update -y
          sudo apt-get install -y enca

      - name: Run Tests with Coverage
        run: |
          mkdir -p build
          XDEBUG_MODE=coverage ./vendor/bin/phpunit --coverage-clover=build/coverage.xml

      - name: Check 100% Coverage
        run: |
          apt-get update && apt-get install -y bc || true

          FULL_REPORT=$(XDEBUG_MODE=coverage ./vendor/bin/phpunit --coverage-text)
          COVERAGE=$(echo "$FULL_REPORT" | grep "Lines:" | awk '{print $2}' | tr -d '%')

          echo "Coverage is $COVERAGE%"

          # Use bc for floating point comparison.
          # On failure, print the full report for easy debugging.
          if [ "$(echo "$COVERAGE < 100" | bc)" -eq 1 ]; then
            echo "❌ Coverage is below 100%."
            echo "--- Full Coverage Report ---"
            echo "$FULL_REPORT"
            echo "----------------------------"
            exit 1
          fi

          echo "✅ 100% coverage achieved!"

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Needed to get PR information
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Regenerate All
        run: bash ./@tools/regenerate.all

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: logs
          path: './@tools/regenerate.all.log'

  deploy-docs:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, intl, gd, xml, dom, zip, bz2
          tools: composer
          ini-values: phar.readonly=0

      - name: Install Dependencies
        run: composer install --prefer-dist --no-progress

      - name: Generate PHPDoc
        run: bash ./@tools/generate-phpdoc.sh

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './@phpdocs'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4